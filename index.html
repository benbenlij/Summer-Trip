
<style>
*{box-sizing:border-box;margin:0;padding:0}
.planner{padding:16px 0}
.city-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.city-tab{padding:7px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.city-tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.city-view{display:none}.city-view.active{display:block}
.day-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.day-tab{padding:5px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.day-tab.active{border-color:var(--color-border-primary);color:var(--color-text-primary);font-weight:500}
.day-view{display:none}.day-view.active{display:block}
.day-header{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.day-subtitle{font-size:12px;color:var(--color-text-secondary);margin-bottom:14px}
.timeline{display:flex;flex-direction:column;gap:0}
.slot{display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.slot:last-child{border-bottom:none}
.time-col{min-width:72px;font-size:11px;color:var(--color-text-tertiary);padding-top:2px;text-align:right;flex-shrink:0}
.dot-col{display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-line{width:1px;background:var(--color-border-tertiary);flex:1;min-height:12px;margin-top:3px}
.slot-body{flex:1}
.slot-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.slot-note{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;margin-right:4px;margin-top:3px;font-weight:500}
.b-food{background:#FAECE7;color:#993C1D}.b-shop{background:#E6F1FB;color:#185FA5}
.b-exp{background:#E1F5EE;color:#0F6E56}.b-beauty{background:#FBEAF0;color:#993556}
.b-transit{background:#F1EFE8;color:#5F5E5A}.b-tip{background:#FAEEDA;color:#854F0B}
@media(prefers-color-scheme:dark){
.b-food{background:#4A1B0C;color:#F0997B}.b-shop{background:#042C53;color:#85B7EB}
.b-exp{background:#04342C;color:#5DCAA5}.b-beauty{background:#4B1528;color:#ED93B1}
.b-transit{background:#2C2C2A;color:#B4B2A9}.b-tip{background:#412402;color:#EF9F27}}
.dot-food{background:#D85A30}.dot-shop{background:#378ADD}.dot-exp{background:#1D9E75}
.dot-beauty{background:#D4537E}.dot-transit{background:#888780}.dot-tip{background:#BA7517}
.day-summary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.summary-pill{font-size:11px;padding:2px 9px;border-radius:10px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
</style>

const badgeColors={food:"b-food",shop:"b-shop",exp:"b-exp",beauty:"b-beauty",transit:"b-transit",tip:"b-tip"};
const typeLabel={food:"Food",shop:"Shop",exp:"Experience",beauty:"Beauty",transit:"Transit",tip:"Tip"};

function buildPlanner(){
  const tabsEl=document.getElementById("cityTabs");
  const viewsEl=document.getElementById("cityViews");
  cities.forEach((city,ci)=>{
    const tab=document.createElement("button");
    tab.className="city-tab"+(ci===0?" active":"");
    tab.textContent=city.label;
    tab.onclick=()=>{
      document.querySelectorAll(".city-tab").forEach(t=>t.classList.remove("active"));
      document.querySelectorAll(".city-view").forEach(v=>v.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("cv-"+city.id).classList.add("active");
    };
    tabsEl.appendChild(tab);

    const view=document.createElement("div");
    view.className="city-view"+(ci===0?" active":"");
    view.id="cv-"+city.id;

    const dayTabs=document.createElement("div");
    dayTabs.className="day-tabs";
    const dayViews=document.createElement("div");

    city.days.forEach((day,di)=>{
      const dtab=document.createElement("button");
      dtab.className="day-tab"+(di===0?" active":"");
      dtab.textContent="Day "+(di+1);
      dtab.onclick=()=>{
        view.querySelectorAll(".day-tab").forEach(t=>t.classList.remove("active"));
        view.querySelectorAll(".day-view").forEach(v=>v.classList.remove("active"));
        dtab.classList.add("active");
        document.getElementById("dv-"+city.id+"-"+di).classList.add("active");
      };
      dayTabs.appendChild(dtab);

      const dview=document.createElement("div");
      dview.className="day-view"+(di===0?" active":"");
      dview.id="dv-"+city.id+"-"+di;

      const counts={food:0,shop:0,exp:0,beauty:0};
      day.slots.forEach(s=>{if(counts[s.type]!==undefined)counts[s.type]++;});

      dview.innerHTML=`<div class="day-header">${day.title}</div><div class="day-subtitle">${day.subtitle}</div>
      <div class="day-summary">${Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>`<span class="summary-pill">${v} ${typeLabel[k]||k}</span>`).join("")}</div>`;

      const tl=document.createElement("div");
      tl.className="timeline";
      day.slots.forEach((slot,si)=>{
        const el=document.createElement("div");
        el.className="slot";
        el.innerHTML=`<div class="time-col">${slot.t}</div>
        <div class="dot-col"><div class="dot ${typeColors[slot.type]||"dot-transit"}"></div>${si<day.slots.length-1?'<div class="dot-line"></div>':''}</div>
        <div class="slot-body"><div class="slot-name">${slot.n}</div>${slot.note?`<div class="slot-note">${slot.note}</div>`:""}
        <span class="badge ${badgeColors[slot.type]||"b-transit"}">${typeLabel[slot.type]||slot.type}</span></div>`;
        tl.appendChild(el);
      });
      dview.appendChild(tl);
      dayViews.appendChild(dview);
    });

    view.appendChild(dayTabs);
    view.appendChild(dayViews);
    viewsEl.appendChild(view);
  });
}
buildPlanner();
</script>
